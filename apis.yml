aid: remind
name: Remind
description: >-
  Remind is a K-12 school-home communication platform that lets teachers,
  schools, and districts message students and families by text, app, email,
  and voice without exchanging personal phone numbers. The product line
  includes Remind Chat, a free two-way messaging service used by individual
  teachers and classrooms, and Remind Hub, a paid district-wide
  communications platform with administrative controls, SIS integration,
  delivery analytics, and translation into 90+ languages. Remind reports use
  in roughly 80% of US public schools and by a majority of US teachers. In
  November 2023, Santa Barbara-based ParentSquare acquired Remind, and the
  combined company now operates under the ParentSquare name with Remind Hub
  continuing for existing district customers and Remind Chat continuing for
  classroom-level use; Remind Tutoring was discontinued as part of the
  combination. Remind's only externally documented developer surface is the
  Share on Remind SDK (the "Remind Share SDK"), a partner program that lets
  approved third-party content providers embed the Remind composer into
  their own product, authenticate Remind users via OAuth 2.0, serve
  shareable content and previews via partner-hosted webhooks, and ship
  messages back through Remind. The Share SDK is accessed by application
  through partners@remind.com and the developer console at
  remind.com/integrations; there is no public self-serve REST API, no
  published OpenAPI specification, and no general-purpose messaging API
  for sending Remind messages from third-party systems.
